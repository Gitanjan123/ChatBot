server.port=8081

# Put your key in environment variable - NEVER hardcode here
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=google gemini api key
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2048

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.system-prompt=You are a helpful, friendly AI assistant. Answer clearly and use markdown formatting when appropriate.